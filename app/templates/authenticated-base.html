{% extends "base.html" %}

{% block internal_css %}
<style>
    :root {
        --bs-font-sans-serif: 'Roboto', Arial, sans-serif;
        --bs-body-font-family: 'Roboto', Arial, sans-serif;
        --blue:      #1565C0;
        --blue-dark: #0d47a1;
        --platinum:  #E5E4E2;
    }

    body { overflow-x: hidden; }

    #wrapper { display: flex; height: 100vh; }

    #sidebar {
        width: 300px;
        background-color: var(--blue);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    #content {
        flex: 1;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        background-color: var(--platinum);
        overflow-y: auto;
    }
    #sidebar {
        overflow: hidden;
    }

    #sidebar h5,h6,strong{
        color: var(--platinum);
        font-weight: 500;
        overflow-y: auto;
        padding: 0.5rem 0.5rem;
    }

    #sidebar p {
        color: var(--platinum) !important;
        font-weight: 300;
        text-shadow: 0px 0px 1px rgba(255, 255, 255, 0.5);
        padding: 0.5rem 0.5rem;
    }

    #sidebar .sidebar-main {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
    }

    a {
        color: whitesmoke;
    }

        
</style>
{% endblock %}

{% block content %}
<div id="wrapper">

    <div id="sidebar">

        <div class="sidebar-main">
            {% block sidebar %}{% endblock %}
        </div>

        <div class="p-3 border-top border-primary-subtle">
            <a class="nav-link text-white-50 d-flex align-items-center" href="/logout">
                <span class="material-symbols-outlined me-2">logout</span>
                Logout
            </a>
        </div>

    </div>

    <div id="content">

        <nav class="navbar bg-white mb-4 px-3 rounded-3 shadow-sm border-bottom border-primary">
            <span class="fw-medium ms-auto text-primary">Welcome, {{user.username}}</span>
        </nav>

        {% block subpage_content %}{% endblock %}

    </div>

</div>

{% block subpage_scripts %}{% endblock %}
{% endblock %}
