{% extends "base.html" %}

{% block internal_css %}
<style>
    body {
        overflow-x: hidden;
        background-color: #f8f9fa;
    }

    #wrapper {
        display: flex;
        height: 100vh;
    }

    #sidebar {
        width: 300px;
        background: #1b263b;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    #content {
        flex: 1;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        background-color: #f8f9fa;
    }
</style>
{% endblock %}

{% block content %}
<div id="wrapper">


    <div id="sidebar">

        <div style="padding: 15px;">
            {% block sidebar %}{% endblock %}
        </div>

        <div style="padding: 15px; border-top: 1px solid #415a77;">
            <a class="nav-link text-danger d-flex align-items-center" href="/logout">
                <span class="material-symbols-outlined me-2">logout</span>
                Logout
            </a>
        </div>

    </div>

    <div id="content">

        <nav class="navbar navbar-expand-lg bg-white mb-4 px-3 rounded-3 shadow-sm">
            <span class="fw-semibold ms-auto">Welcome, {{user.username}}</span>
        </nav>

        {% block subpage_content %}{% endblock %}

    </div>

</div>

{% block subpage_scripts %}{% endblock %}
{% endblock %}
